name: Test
on:
  # Trigger the workflow on pushes to only the 'master' branch (this avoids duplicate checks being run pull requests)
  push:
    branches: [master]
  # Trigger the workflow on any pull request
  pull_request:

env:
  UV_VERSION: 0.10.11
  PYTHON_VERSION: "3.10"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        run: pip install uv==${{ env.UV_VERSION }}
      - name: Install dependencies
        run: uv sync --group test --python ${{ matrix.python-version }}
      - name: Run unit tests
        run: uv run tox run -- --memray --cov-report=term

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up uv
        run: pip install uv==${{ env.UV_VERSION }}
      - name: Install dependencies
        run: uv sync --group test --python ${{ env.PYTHON_VERSION }}
      - name: Run flake8
        run: uv run flake8
      - name: Run mypy
        run: uv run mypy
      - name: Run black
        run: uv run black --check hiku examples

  test-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Lets
        uses: lets-cli/lets-action@v1.1
        with:
          version: latest
      - name: Test database integration
        run: timeout 600 lets test-pg

  federation-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Lets
        uses: lets-cli/lets-action@v1.1
        with:
          version: latest
      - name: Test federation compatibility
        run: timeout 600 lets federation-compatibility-test
