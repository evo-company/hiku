name: CodSpeed

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  UV_VERSION: "0.10.11"
  PYTHON_VERSION: "3.12"

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        run: pip install uv==${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --group test --python ${{ env.PYTHON_VERSION }}

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run pytest tests/benchmarks --codspeed
