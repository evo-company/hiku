name: Codeflash

on:
  pull_request:
    paths:
      # So that this workflow only runs when code within the target module is modified
      - 'hiku/**'
  workflow_dispatch:

concurrency:
  # Any new push to the PR will cancel the previous run, so that only the latest code is optimized
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  optimize:
    name: Optimize new Python code
    # Don't run codeflash on codeflash-ai[bot] commits, prevent duplicate optimizations
    if: ${{ github.actor != 'codeflash-ai[bot]' }}
    runs-on: ubuntu-latest
    env:
      CODEFLASH_API_KEY: ${{ secrets.CODEFLASH_API_KEY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install required system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential
      - name: Upgrade pip
        run: python -m pip install --upgrade pip==23.1.2
      - name: Install uv (dependency manager)
        run: pip install uv==0.10.11
      - name: Install Python dependencies
        run: uv sync --group test --python 3.10
      - name: ⚡️Codeflash Optimization
        run: uv run codeflash
